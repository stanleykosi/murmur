# Railway config-as-code for the Murmur Fastify API service.
# Use this file for the Railway API service while keeping the service root at
# the repository root so pnpm workspace dependencies remain available.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter api build"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig.base.json",
  "turbo.json",
  "infra/api.railway.toml"
]


startCommand = "pnpm --filter api start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
overlapSeconds = 10
drainingSeconds = 30

[environments.pr.deploy]
restartPolicyType = "NEVER"
