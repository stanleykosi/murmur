# Railway config-as-code for the Murmur Centrifugo service.
# Redis should be provisioned separately using Railway's managed Redis template.
# API and agent services are intentionally excluded until those applications are
# far enough along to justify deploy configs of their own.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/centrifugo.Dockerfile"
watchPatterns = [
  "infra/centrifugo.Dockerfile",
  "infra/centrifugo.json",
  "infra/railway.toml"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
overlapSeconds = 10
drainingSeconds = 30

[environments.pr.deploy]
restartPolicyType = "NEVER"
